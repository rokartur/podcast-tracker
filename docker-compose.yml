services:
  db:
    image: postgres:17-alpine
    container_name: podcast_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: podcast
      POSTGRES_PASSWORD: podcast_dev_pw
      POSTGRES_DB: podcast_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U podcast -d podcast_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

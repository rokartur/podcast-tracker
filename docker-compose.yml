# Full stack: Postgres + one-shot schema push + the lean Next.js app.
#
#   cp .env.example .env   # then fill BETTER_AUTH_SECRET, AI key, CRON_SECRET...
#   docker compose up --build
#
# Serves http://localhost:3000. DATABASE_URL is pinned below to the bundled `db`
# service (overrides .env), so the stack is self-contained. For an EXTERNAL
# Postgres: point DATABASE_URL at it and drop the `db` service + its depends_on.
#
# The default `app` is the lean Alpine image WITHOUT the Chromium reach scraper.
# To enable "Refresh numbers" (X/YouTube counts), build the heavier variant and
# persist its browser data — uncomment the marked lines under `app`.
services:
  db:
    image: postgres:17-alpine
    container_name: podcast_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: podcast
      POSTGRES_PASSWORD: podcast_dev_pw
      POSTGRES_DB: podcast_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U podcast -d podcast_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Applies the Drizzle schema, then exits. The app waits for it to finish.
  # Destructive schema changes need confirmation: run manually with a TTY ->
  #   docker compose run --rm migrate npm run db:push -- --force
  migrate:
    build:
      context: .
      target: migrator
    image: podcast-tracker-migrate
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://podcast:podcast_dev_pw@db:5432/podcast_tracker
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner # <- swap to `runner-reach` to enable the Chromium scraper
    image: podcast-tracker
    container_name: podcast_tracker_app
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://podcast:podcast_dev_pw@db:5432/podcast_tracker
      # DATABASE_SSL: "require"   # set if pointing at a TLS-only external DB
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # --- Reach scraper only (with target: runner-reach): persist Chromium + login
    # volumes:
    #   - cloak_cache:/home/nextjs/.cloakbrowser
    #   - cloak_profile:/home/nextjs/cloak-profile

volumes:
  pgdata:
  # cloak_cache:     # uncomment with the reach scraper volumes above
  # cloak_profile:
